name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build test container
        run: docker compose build sqler_mdb_dialect

      - name: Fix TLS file ownership and permissions
        run: |
          chmod 600 test/fixtures/ssl/server-key.pem test/fixtures/ssl/client-key.pem
          chmod 644 test/fixtures/ssl/ca.pem test/fixtures/ssl/server-cert.pem test/fixtures/ssl/client-cert.pem

      - name: Start test stack
        run: docker compose up -d

      - name: Show container state
        run: |
          docker ps -a
          docker logs --details sqler_mdb || true
          docker logs --details sqler_mdb_dialect || true

      ### need to wait until MySQL is healthy before altering user in next step
      - name: Wait for MySQL healthcheck
        shell: bash
        run: |
          for i in $(seq 1 80); do
            status="$(docker inspect -f '{{.State.Health.Status}}' sqler_mdb)"
            echo "sqler_mdb health: $status"
            [ "$status" = "healthy" ] && exit 0
            sleep 2
          done
          docker logs --details sqler_mdb || true
          exit 1

      ### tell MySQL to accept X509 client certs for the user (use "REQUIRE X509" for strict or "REQUIRE SSL" for any SSL)
      - name: Configure MySQL SSL user
        run: |
          docker exec sqler_mdb sh -lc '
            mysql -h127.0.0.1 -P3306 -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
              ALTER USER '\''root'\''@'\''%'\'' REQUIRE SSL;
              FLUSH PRIVILEGES;
            "
          '

      - name: Run test suite in dialect container
        shell: bash
        run: |
          source test/run.sh sqler_mdb sqler_mdb_dialect "npm test"

      - name: Dump logs on failure
        if: failure()
        run: |
          docker ps -a
          docker logs --details sqler_mdb || true
          docker logs --details sqler_mdb_dialect || true

      - name: Tear down containers
        if: always()
        run: docker compose down -v