name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build test container
        run: docker compose build sqler_mdb_dialect

      - name: Start test stack
        run: docker compose up -d

      - name: Show container state
        run: |
          docker ps -a
          docker logs --details sqler_mdb || true
          docker logs --details sqler_mdb_dialect || true

      ### tell MySQL to accept X509 client certs for the user
      - name: Configure MySQL SSL user
        run: |
          docker exec sqler_mdb sh -lc '
            mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
              ALTER USER '\''root'\''@'\''%'\'' REQUIRE SSL;
              FLUSH PRIVILEGES;
            "
          '

      - name: Run test suite in dialect container
        shell: bash
        run: |
          source test/run.sh sqler_mdb sqler_mdb_dialect "npm test"

      - name: Dump logs on failure
        if: failure()
        run: |
          docker ps -a
          docker logs --details sqler_mdb || true
          docker logs --details sqler_mdb_dialect || true

      - name: Tear down containers
        if: always()
        run: docker compose down -v