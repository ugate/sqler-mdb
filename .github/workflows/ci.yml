name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build test container
        run: docker compose build sqler_mdb_dialect

      - name: Start test stack
        run: docker compose up -d

      - name: Show container state
        run: |
          docker ps -a
          docker logs --details sqler_mdb || true
          docker logs --details sqler_mdb_dialect || true

      ### Verify MySQL and dialect containers have matching certs
      # - name: Inspect TLS certs inside containers
      #   shell: bash
      #   run: |
      #     echo "=== MySQL container certs ==="
      #     docker exec sqler_mdb sh -lc '
      #       openssl x509 -in /etc/mysql/ssl/ca.pem -noout -subject -issuer
      #       openssl x509 -in /etc/mysql/ssl/server-cert.pem -noout -subject -issuer
      #     '
      #     echo "=== Dialect container certs ==="
      #     docker exec sqler_mdb_dialect sh -lc '
      #       openssl x509 -in /home/node/app/test/fixtures/ssl/ca.pem -noout -subject -issuer
      #       openssl x509 -in /home/node/app/test/fixtures/ssl/client-cert.pem -noout -subject -issuer
      #     '

      ### Verify MySQL runtime SSL variables
      - name: Inspect MySQL SSL runtime config
        shell: bash
        run: |
          docker exec sqler_mdb sh -lc '
            mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
              SHOW VARIABLES LIKE '\''ssl_ca'\'';
              SHOW VARIABLES LIKE '\''ssl_cert'\'';
              SHOW VARIABLES LIKE '\''ssl_key'\'';
              SHOW VARIABLES LIKE '\''require_secure_transport'\'';
            "
          '
      
      ### Verify the client cert chains against the CA inside the containers
      - name: Verify cert chains inside containers
        shell: bash
        run: |
          echo "=== Verify in MySQL container ==="
          docker exec sqler_mdb sh -lc '
            openssl verify -CAfile /etc/mysql/ssl/ca.pem /etc/mysql/ssl/server-cert.pem || true
          '

          echo "=== Verify in dialect container ==="
          docker exec sqler_mdb_dialect sh -lc '
            openssl verify -CAfile /home/node/app/test/fixtures/ssl/ca.pem /home/node/app/test/fixtures/ssl/client-cert.pem || true
          '

      - name: Run test suite in dialect container
        shell: bash
        run: |
          source test/run.sh sqler_mdb sqler_mdb_dialect "npm test"

      - name: Dump logs on failure
        if: failure()
        run: |
          docker ps -a
          docker logs --details sqler_mdb || true
          docker logs --details sqler_mdb_dialect || true

      - name: Tear down containers
        if: always()
        run: docker compose down -v